kind = "web"
previewPath = "/"
title = "Lawctopus Landing Page"
version = "1.0.0"
id = "artifacts/lawctopus-landing"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21984

[services.development]
run = "pnpm --filter @workspace/lawctopus-landing run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/lawctopus-landing", "run", "build" ]
publicDir = "artifacts/lawctopus-landing/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21984"
BASE_PATH = "/"
